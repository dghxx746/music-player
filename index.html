<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraFlow - 音乐氛围播放器</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 全屏背景画布 -->
  <canvas id="bgCanvas"></canvas>
  <canvas id="vizCanvas"></canvas>

  <!-- 背景图片层 -->
  <div id="bgImageLayer"></div>

  <!-- 粒子覆盖层 -->
  <div id="particlesOverlay"></div>

  <!-- 主界面 -->
  <div id="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◉</span>
        <span class="logo-text">AuraFlow</span>
      </div>
      <div class="header-track-info">
        <span id="headerTrackName" class="header-track-name">未在播放</span>
      </div>
      <div class="header-actions">
        <button id="bgUploadBtn" class="icon-btn" title="上传背景图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <button id="bgClearBtn" class="icon-btn hidden" title="清除背景图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <button id="vizModeBtn" class="icon-btn" title="切换可视化模式">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button id="themeBtn" class="icon-btn" title="切换主题色彩">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 主内容区：左侧播放列表 + 中间可视化 + 右侧信息 -->
    <main class="main-content">
      <!-- 左侧播放列表 -->
      <aside class="panel panel-left glass-card">
        <div class="panel-header">
          <h3>播放列表</h3>
          <div class="panel-header-actions">
            <button id="addFilesBtn" class="small-btn glow-btn">+ 添加</button>
            <button id="clearLibraryBtn" class="small-btn-clear" title="清空音乐库">清空</button>
          </div>
        </div>
        <div id="playlistItems" class="playlist-items">
          <div class="playlist-empty">
            <p>拖拽音乐文件到此处</p>
            <p class="sub">MP3 / WAV / OGG / FLAC</p>
          </div>
        </div>
      </aside>

      <!-- 中央可视化区域 -->
      <section class="center-area">
        <div class="viz-container" id="vizContainer">
          <div class="cover-disc" id="coverDisc">
            <div class="cover-inner">
              <div class="cover-default" id="coverDefault">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                </svg>
              </div>
              <img id="coverImage" class="cover-img hidden" alt="专辑封面" />
            </div>
          </div>
          <div class="viz-mode-label" id="vizModeLabel">波形</div>
        </div>

        <!-- 底部控制栏 -->
        <div class="controls glass-card">
          <!-- 进度条 -->
          <div class="progress-bar" id="progressBar">
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-thumb" id="progressThumb"></div>
            </div>
            <div class="progress-times">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>
          </div>

          <!-- 播放控制 -->
          <div class="playback-row">
            <button id="shuffleBtn" class="ctrl-btn small" title="随机播放">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                <line x1="4" y1="4" x2="9" y2="9"/>
              </svg>
            </button>
            <button id="prevBtn" class="ctrl-btn glow-btn" title="上一首">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
              </svg>
            </button>
            <button id="playBtn" class="ctrl-btn play-btn glow-btn" title="播放/暂停">
              <svg class="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <svg class="pause-icon hidden" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
              </svg>
            </button>
            <button id="nextBtn" class="ctrl-btn glow-btn" title="下一首">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
              </svg>
            </button>
            <button id="repeatBtn" class="ctrl-btn small" title="循环模式">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </button>
          </div>

          <!-- 音量 -->
          <div class="volume-row">
            <button id="muteBtn" class="icon-btn" title="静音">
              <svg class="vol-high" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              <svg class="vol-mute hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
              </svg>
            </button>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="75" />
          </div>
        </div>
      </section>

      <!-- 右侧音乐信息 -->
      <aside class="panel panel-right glass-card">
        <div class="panel-header">
          <h3>音乐详情</h3>
        </div>
        <div id="trackDetail" class="track-detail">
          <div class="detail-empty">
            <p>暂无音乐信息</p>
            <p class="sub">选择一首歌曲开始播放</p>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <!-- 拖拽覆盖层 -->
  <div id="dragOverlay" class="drag-overlay hidden">
    <div class="drag-content">
      <div class="drop-icon">🎵</div>
      <div class="drop-text">释放以添加音乐</div>
      <div class="drop-sub">支持 MP3、WAV、OGG、FLAC 等格式</div>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept="audio/*" multiple style="display:none" />
  <input type="file" id="bgImageInput" accept="image/*" style="display:none" />

  <script src="app.js"></script>
</body>
</html>
